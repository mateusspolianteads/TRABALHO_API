<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Busão do Rolê</title>
    <link rel="stylesheet" href="../static/css/cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <img src="../static/img/logo_branca.png" alt="Logo Busão do Rolê" class="login-logo">
            </div>
            
            <h2>Crie sua conta</h2>
            <p class="subtitle">Preencha os dados para começar a usar.</p>

            <form class="login-form">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <div class="input-field">
                        <i data-lucide="user"></i>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="doc">CPF/CNPJ</label>
                    <div class="input-field">
                        <i data-lucide="file-text"></i>
                        <input type="text" id="doc" name="cpf_cnpj" placeholder="000.000.000-00" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <div class="input-field">
                        <i data-lucide="mail"></i>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <div class="input-field">
                        <i data-lucide="lock"></i>
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">Cadastrar</button>
            </form>

            <div class="login-footer">
                <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="../static/javascript/cadastro.js"></script>
</body>
</html>
